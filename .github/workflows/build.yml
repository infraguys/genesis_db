name: build

on:
  push:

env:
  ARTIFACTS_PATH: artifacts

jobs:
  Build:
    runs-on: self-hosted
    if : ${{ github.actor != 'dependabot[bot]' }}
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 30
      - name: Build Exordos DB
        env:
            PUSH_CFG: ${{ secrets.PUSH_CFG }}
        run: |
          set -eux

          mkdir -p ${ARTIFACTS_PATH}

          source ~/.profile
          VERSION="$(genesis get-version .)"

          genesis build $(pwd) --inventory

          # Decode and write the push configuration
          echo "$PUSH_CFG" | base64 -d > genesis/genesis.push.yaml
          genesis push -c genesis/genesis.push.yaml -t local -f --latest

          # Temporary upload step is done in the build script
          echo "${VERSION}" > "${ARTIFACTS_PATH}/version.txt"
          mv output/images/*.raw.gz "${ARTIFACTS_PATH}/"
      - name: Set current date as env variable
        id: date
        run: |
          r=$(date -u +'%Y.%m.%d')
          echo "DATE=$r" >> $GITHUB_OUTPUT
      - name: Publish image (for tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./artifacts/*.gz
          tag: ${{ github.ref }}
          release_name: ${{ steps.date.outputs.DATE }} (${{ github.ref_name }})
          overwrite: true
          file_glob: true
