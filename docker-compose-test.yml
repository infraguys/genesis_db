services:
  postgres:
    image: postgres:latest
    command: -c 'max_connections=100'
    environment:
      POSTGRES_USER: exordos_db
      POSTGRES_PASSWORD: exordos_db
      POSTGRES_DB: exordos_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
#    volumes:
#      - ./pgdata:/var/lib/postgresql/data/pgdata
