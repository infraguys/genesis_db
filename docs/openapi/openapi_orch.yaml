      operationId: Get_OpenApi_specification
  /v1/:
    get:
      summary: Returns a list of all routes in the main route that are collection
      tags: []
      parameters:
        - name: filters
          description: "the filters to apply when filtering the routes (Is not\nimplemented
            now)\n"
