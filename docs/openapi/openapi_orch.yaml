openapi: 3.0.3
info:
  title: Genesis DB v1 Orch API
  version: latest
  description: OpenAPI - Genesis DB v1
components:
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      title: error
      description: Error occurred while processing request
      type: object
      required:
        - status
        - json
      properties:
        status:
          type: integer
          description: The HTTP status code
          minimum: 400
          exclusiveMaximum: true
          example: 503
        json:
          type: object
          description: Detail error map
          required:
            - code
            - type
            - message
          properties:
            code:
              type: integer
              description: The HTTP status code
              minimum: 400
              exclusiveMaximum: true
              example: 503
            type:
              type: string
              description: Error class name
              example: OSError
            message:
              type: string
              description: Error message
              example: A human-readable explanation of problem
      example:
        code: 400
        json:
          code: 400
          type: ValidationErrorException
          message: Validation error occurred.
    UniversalAgent_Get:
      type: object
      properties:
        uuid:
          type: string
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        name:
          type: string
          minLength: 0
          maxLength: 255
          example: any_string
        description:
          type: string
          minLength: 0
          maxLength: 255
          example: any_string
          default: ''
        created_at:
          type: string
          x-ogen-time-format: '2006-01-02T15:04:05.000576Z'
          example: '2006-01-02T15:04:05.000576Z'
          format: date-time
          default: '2006-01-02T15:04:05.000576Z'
        updated_at:
          type: string
          x-ogen-time-format: '2006-01-02T15:04:05.000576Z'
          example: '2006-01-02T15:04:05.000576Z'
          format: date-time
          default: '2006-01-02T15:04:05.000576Z'
        capabilities:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
              - type: boolean
              - type: object
              - type: array
                items: {}
          example:
            key: value
          default: {}
        facts:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
              - type: boolean
              - type: object
              - type: array
                items: {}
          example:
            key: value
          default: {}
        node:
          type: string
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        status:
          type: string
          enum:
            - ACTIVE
            - DISABLED
            - ERROR
            - NEW
          example: NEW
          default: NEW
      required:
        - uuid
        - name
        - node
  parameters:
    UniversalAgentUuid:
      name: UniversalAgentUuid
      in: path
      schema:
        type: string
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
      required: true
    name:
      name: name
      in: query
      schema:
        type: string
        minLength: 0
        maxLength: 255
        example: any_string
    description:
      name: description
      in: query
      schema:
        type: string
        minLength: 0
        maxLength: 255
        example: any_string
        default: ''
    created_at:
      name: created_at
      in: query
      schema:
        type: string
        x-ogen-time-format: '2006-01-02T15:04:05.000576Z'
        example: '2006-01-02T15:04:05.000576Z'
        format: date-time
        default: '2006-01-02T15:04:05.000576Z'
    updated_at:
      name: updated_at
      in: query
      schema:
        type: string
        x-ogen-time-format: '2006-01-02T15:04:05.000576Z'
        example: '2006-01-02T15:04:05.000576Z'
        format: date-time
        default: '2006-01-02T15:04:05.000576Z'
    capabilities:
      name: capabilities
      in: query
      schema:
        type: object
        additionalProperties:
          oneOf:
            - type: string
            - type: integer
            - type: boolean
            - type: object
            - type: array
              items: {}
        example:
          key: value
        default: {}
    facts:
      name: facts
      in: query
      schema:
        type: object
        additionalProperties:
          oneOf:
            - type: string
            - type: integer
            - type: boolean
            - type: object
            - type: array
              items: {}
        example:
          key: value
        default: {}
    node:
      name: node
      in: query
      schema:
        type: string
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
    status:
      name: status
      in: query
      schema:
        type: string
        enum:
          - ACTIVE
          - DISABLED
          - ERROR
          - NEW
        example: NEW
        default: NEW
paths:
