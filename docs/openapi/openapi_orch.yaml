              schema:
                type: array
                items:
                  type: string
        default:
          $ref: '#/components/responses/Error'
      operationId: Get_urls
  /specifications/:
    get:
      summary: Get OpenApiSpecificationRoute OpenApiSpecificationControllers
      tags: []
