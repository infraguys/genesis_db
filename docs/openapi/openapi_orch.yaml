      operationId: Filter_v1
  /v1/agents/{UniversalAgentUuid}:
    get:
      summary: Get UniversalAgent
      tags:
        - UniversalAgent
      parameters:
        - name: UniversalAgentUuid
          in: path
          schema:
            type: string
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          required: true
      responses:
        '200':
          description: UniversalAgent_Get
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalAgent_Get'
        default:
