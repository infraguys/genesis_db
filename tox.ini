[tox]
envlist = begin,py3{10,11,12,13,14},end
          py3{10,11,12,13,14}-functional
          ruff,ruff-check,mypy
minversion = 2.0
skipsdist = false
skip_missing_interpreters = true

[testenv]
runner = uv-venv-lock-runner
extras =
  test
setenv =
  PACKAGE_NAME=genesis_db
  TEST_PATH={env:PACKAGE_NAME}/tests/unit
  functional: TEST_PATH={env:PACKAGE_NAME}/tests/functional
  functional: DATABASE_URI={env:DATABASE_URI:postgresql://genesis_db:pass@localhost:5432/genesis_db}
commands =
  coverage run -p -m pytest {posargs} --timer-top-n=10 {env:TEST_PATH}
allowlist_externals =
  markdownlint-cli2
  genesis

[testenv:begin]
runner = uv-venv-lock-runner
envdir = {toxworkdir}/cover
commands =
  coverage erase

[testenv:end]
runner = uv-venv-lock-runner
envdir = {toxworkdir}/cover
commands =
  coverage combine
  coverage html -d cover
  coverage xml -o cover/coverage.xml
  coverage report --skip-covered

[testenv:ruff-check]
extras =
  ruff
runner = uv-venv-lock-runner
commands = ruff check .

[testenv:ruff]
extras =
  ruff
runner = uv-venv-lock-runner
commands = ruff format

[testenv:mypy]
extras =
  mypy
runner = uv-venv-lock-runner
commands = mypy -p genesis_db

[testenv:develop]
runner = uv-venv-lock-runner
extras =
  test
usedevelop=true

[testenv:docs]
extras =
  docs
runner = uv-venv-lock-runner
commands = mkdocs serve --dev-addr 0.0.0.0:8181 --livereload

[testenv:docs-deploy]
extras =
  docs
runner = uv-venv-lock-runner
commands = mkdocs gh-deploy --force

[testenv:mdlint]
runner = uv-venv-lock-runner
commands = markdownlint-cli2 --config .markdownlint.yaml "**/*.md" "#node_modules" --fix

[testenv:build]
runner = uv-venv-lock-runner
commands = genesis build -i /home/user/.ssh/id_rsa.pub -f . --inventory --manifest-var repository=https://repository.genesis-core.tech
